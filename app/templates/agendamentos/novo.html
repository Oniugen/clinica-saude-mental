{% extends "base.html" %}

{% block title %}Novo Agendamento - Clínica de Saúde Mental{% endblock %}

{% block extra_css %}
<style>
    .form-section {
        background: white;
        border-radius: 10px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .form-section-title {
        font-size: 16px;
        font-weight: 600;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #0066cc;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .form-group {
        margin-bottom: 0;
    }

    .form-group.full {
        grid-column: 1 / -1;
    }

    .info-box {
        background: #f0f7ff;
        border-left: 4px solid #0066cc;
        padding: 12px 15px;
        border-radius: 4px;
        font-size: 13px;
        color: #555;
        margin-top: 8px;
    }



    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .form-group.full {
            grid-column: 1;
        }
    }
</style>
{% endblock %}

{% block content %}
<h2>Novo Agendamento</h2>

<div class="form-section">
    <div class="form-section-title">Informações do Agendamento</div>
    
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="paciente_id">Paciente *</label>
                <select id="paciente_id" name="paciente_id" required>
                    <option value="">Selecione um paciente</option>
                    {% for paciente in pacientes %}
                    <option value="{{ paciente.id }}">{{ paciente.nome }} (CPF: {{ paciente.cpf|format_cpf }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="profissional_id">Profissional (Doutor) *</label>
                <select id="profissional_id" name="profissional_id" required>
                    <option value="">Selecione um profissional</option>
                    {% for profissional in profissionais %}
                    <option value="{{ profissional.id }}">
                        {{ profissional.nome }} ({{ profissional.especialidade }})
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="data_agendamento">Data do Agendamento *</label>
                <input type="date" id="data_agendamento" name="data_agendamento" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="hora_inicio">Hora de Início *</label>
                <input type="time" id="hora_inicio" name="hora_inicio" required>
            </div>
            
            <div class="form-group">
                <label for="hora_fim">Hora de Término *</label>
                <input type="time" id="hora_fim" name="hora_fim" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="consultorio_sala">Consultório / Sala *</label>
                <input type="text" id="consultorio_sala" name="consultorio_sala" required placeholder="Ex: Sala 1, Sala 201, Consultório A">
            </div>

            <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                    <option value="Agendado">Agendado</option>
                    <option value="Realizado">Realizado</option>
                    <option value="Cancelado">Cancelado</option>
                    <option value="Reagendado">Reagendado</option>
                    <option value="Não compareceu">Não compareceu</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" name="observacoes" placeholder="Adicione observações sobre o agendamento..."></textarea>
            </div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('agendamentos.listar_agendamentos') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Criar Agendamento</button>
        </div>
    </form>
</div>


{% endblock %}
