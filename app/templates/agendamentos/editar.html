{% extends "base.html" %}

{% block title %}Editar Agendamento - Clínica de Saúde Mental{% endblock %}

{% block extra_css %}
<style>
    .form-section {
        background: white;
        border-radius: 10px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .form-section-title {
        font-size: 16px;
        font-weight: 600;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #0066cc;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .form-group {
        margin-bottom: 0;
    }

    .form-group.full {
        grid-column: 1 / -1;
    }

    .info-note {
        background: #f0f7ff;
        border-left: 4px solid #0066cc;
        padding: 12px 15px;
        border-radius: 4px;
        font-size: 13px;
        color: #555;
        margin-top: 8px;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .form-group.full {
            grid-column: 1;
        }
    }
</style>
{% endblock %}

{% block content %}
<h2>Editar Agendamento</h2>

<div class="form-section">
    <div class="form-section-title">Editar Informações do Agendamento</div>
    
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="paciente_id">Paciente *</label>
                <select id="paciente_id" name="paciente_id" required>
                    <option value="">Selecione um paciente</option>
                    {% for paciente in pacientes %}
                    <option value="{{ paciente.id }}" {% if paciente.id == agendamento.paciente_id %}selected{% endif %}>
                        {{ paciente.nome }} (CPF: {{ paciente.cpf|format_cpf }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="profissional_id">Profissional *</label>
                <select id="profissional_id" name="profissional_id" required>
                    <option value="">Selecione um profissional</option>
                    {% for profissional in profissionais %}
                    <option value="{{ profissional.id }}"
                            {% if profissional.id == agendamento.profissional_id %}selected{% endif %}>
                        {{ profissional.nome }} ({{ profissional.especialidade }})
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="data_agendamento">Data do Agendamento *</label>
                <input type="date" id="data_agendamento" name="data_agendamento"
                       value="{{ agendamento.data_agendamento.strftime('%Y-%m-%d') }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="hora_inicio">Hora de Início *</label>
                <input type="time" id="hora_inicio" name="hora_inicio"
                       value="{{ agendamento.hora_inicio.strftime('%H:%M') if agendamento.hora_inicio else '' }}" required>
            </div>

            <div class="form-group">
                <label for="hora_fim">Hora de Término *</label>
                <input type="time" id="hora_fim" name="hora_fim"
                       value="{{ agendamento.hora_fim.strftime('%H:%M') if agendamento.hora_fim else '' }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="consultorio_sala">Consultório / Sala *</label>
                <input type="text" id="consultorio_sala" name="consultorio_sala" required 
                       value="{{ agendamento.consultorio_sala or '' }}" placeholder="Ex: Sala 1, Sala 201, Consultório A">
            </div>

            <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                    <option value="Agendado" {% if agendamento.status == 'Agendado' %}selected{% endif %}>Agendado</option>
                    <option value="Realizado" {% if agendamento.status == 'Realizado' %}selected{% endif %}>Realizado</option>
                    <option value="Cancelado" {% if agendamento.status == 'Cancelado' %}selected{% endif %}>Cancelado</option>
                    <option value="Reagendado" {% if agendamento.status == 'Reagendado' %}selected{% endif %}>Reagendado</option>
                    <option value="Não compareceu" {% if agendamento.status == 'Não compareceu' %}selected{% endif %}>Não compareceu</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" name="observacoes" placeholder="Adicione ou edite observações sobre o agendamento...">{{ agendamento.observacoes or '' }}</textarea>
            </div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('agendamentos.ver_agendamento', id=agendamento.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Salvar Alterações</button>
        </div>
    </form>
</div>

{% endblock %}
