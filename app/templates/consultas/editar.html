{% extends "base.html" %}

{% block title %}Editar Consulta - Clínica de Saúde Mental{% endblock %}

{% block content %}
<h2>Editar Consulta</h2>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="paciente_id">Paciente *</label>
            <select id="paciente_id" name="paciente_id" required>
                <option value="">Selecione um paciente</option>
                {% for paciente in pacientes %}
                <option value="{{ paciente.id }}" {% if paciente.id == consulta.paciente_id %}selected{% endif %}>
                    {{ paciente.nome }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="profissional_id">Profissional *</label>
            <select id="profissional_id" name="profissional_id" required>
                <option value="">Selecione um profissional</option>
                {% for profissional in profissionais %}
                <option value="{{ profissional.id }}" {% if profissional.id == consulta.profissional_id %}selected{% endif %}>
                    {{ profissional.nome }} ({{ profissional.especialidade }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="consultorio_sala">Consultório / Sala</label>
            <input type="text" id="consultorio_sala" name="consultorio_sala"
                   value="{{ consulta.consultorio_sala or '' }}" placeholder="Ex: Sala 1, Sala 201, Consultório A">
        </div>

        <div class="form-group">
            <label for="data_consulta">Data e Hora da Consulta *</label>
            <input type="datetime-local" id="data_consulta" name="data_consulta"
                   value="{{ consulta.data_consulta.strftime('%Y-%m-%dT%H:%M') }}" required>
        </div>
        
        <div class="form-group">
            <label for="diagnostico">Diagnóstico</label>
            <textarea id="diagnostico" name="diagnostico">{{ consulta.diagnostico or '' }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="prescricao">Prescrição</label>
            <textarea id="prescricao" name="prescricao">{{ consulta.prescricao or '' }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="observacoes">Observações</label>
            <textarea id="observacoes" name="observacoes">{{ consulta.observacoes or '' }}</textarea>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('consultas.ver_consulta', id=consulta.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Salvar Alterações</button>
        </div>
    </form>
</div>
{% endblock %}
