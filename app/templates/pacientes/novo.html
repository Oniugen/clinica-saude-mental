{% extends "base.html" %}

{% block title %}Novo Paciente - Clínica de Saúde Mental{% endblock %}

{% block content %}
<h2>Novo Paciente</h2>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="nome">Nome Completo *</label>
            <input type="text" id="nome" name="nome" required>
        </div>
        
        <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
        </div>
        
        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento *</label>
            <input type="date" id="data_nascimento" name="data_nascimento" required>
        </div>

        <div class="form-group">
            <label for="estado_civil">Estado Civil</label>
            <select id="estado_civil" name="estado_civil">
                <option value="">Selecione</option>
                <option value="Solteiro(a)">Solteiro(a)</option>
                <option value="Casado(a)">Casado(a)</option>
                <option value="Divorciado(a)">Divorciado(a)</option>
                <option value="Viúvo(a)">Viúvo(a)</option>
                <option value="União Estável">União Estável</option>
                <option value="Separado(a)">Separado(a)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="telefone">Telefone *</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
        </div>
        
        <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" name="endereco">
        </div>

        <div class="form-group">
            <label for="nome_contato_emergencia">Nome do Contato de Emergência</label>
            <input type="text" id="nome_contato_emergencia" name="nome_contato_emergencia" placeholder="Nome completo do contato">
        </div>

        <div class="form-group">
            <label for="telefone_contato_emergencia">Telefone do Contato de Emergência</label>
            <input type="tel" id="telefone_contato_emergencia" name="telefone_contato_emergencia" placeholder="(00) 00000-0000">
        </div>
        
        <div class="form-group">
            <label for="historico_medico">Histórico Médico</label>
            <textarea id="historico_medico" name="historico_medico"></textarea>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('pacientes.listar_pacientes') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Cadastrar Paciente</button>
        </div>
    </form>
</div>
{% endblock %}
