{% extends "base.html" %}

{% block title %}Editar Profissional - Clínica de Saúde Mental{% endblock %}

{% block extra_css %}
<style>
    .form-section {
        background: white;
        border-radius: 10px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .form-section-title {
        font-size: 16px;
        font-weight: 600;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #0066cc;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .form-group {
        margin-bottom: 0;
    }

    .form-group.full {
        grid-column: 1 / -1;
    }

    .specialty-note {
        background: #f0f7ff;
        border-left: 4px solid #0066cc;
        padding: 12px 15px;
        border-radius: 4px;
        font-size: 13px;
        color: #555;
        margin-top: 8px;
    }

    .hidden-field {
        display: none;
    }

    .hidden-field.show {
        display: block;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .form-group.full {
            grid-column: 1;
        }
    }
</style>
{% endblock %}

{% block content %}
<h2>Editar Profissional</h2>

<form method="POST">
<div class="form-section">
    <div class="form-section-title">Informações Pessoais</div>
    
        <div class="form-row">
            <div class="form-group">
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" name="nome" value="{{ profissional.nome }}" required>
            </div>
            
            <div class="form-group">
                <label for="cpf">CPF *</label>
                <input type="text" id="cpf" name="cpf" value="{{ profissional.cpf|format_cpf }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="estado_civil">Estado Civil</label>
                <select id="estado_civil" name="estado_civil">
                    <option value="">Selecione</option>
                    <option value="Solteiro(a)" {% if profissional.estado_civil == 'Solteiro(a)' %}selected{% endif %}>Solteiro(a)</option>
                    <option value="Casado(a)" {% if profissional.estado_civil == 'Casado(a)' %}selected{% endif %}>Casado(a)</option>
                    <option value="Divorciado(a)" {% if profissional.estado_civil == 'Divorciado(a)' %}selected{% endif %}>Divorciado(a)</option>
                    <option value="Viúvo(a)" {% if profissional.estado_civil == 'Viúvo(a)' %}selected{% endif %}>Viúvo(a)</option>
                    <option value="União Estável" {% if profissional.estado_civil == 'União Estável' %}selected{% endif %}>União Estável</option>
                    <option value="Separado(a)" {% if profissional.estado_civil == 'Separado(a)' %}selected{% endif %}>Separado(a)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone *</label>
                <input type="tel" id="telefone" name="telefone" value="{{ profissional.telefone }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" value="{{ profissional.email or '' }}">
            </div>

            <div class="form-group">
                <label for="numero_registro">Número de Registro Profissional</label>
                <input type="text" id="numero_registro" name="numero_registro" value="{{ profissional.numero_registro or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full">
                <label for="endereco">Endereço Completo</label>
                <input type="text" id="endereco" name="endereco" value="{{ profissional.endereco or '' }}" placeholder="Rua, número, bairro, cidade, estado, CEP">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="nome_contato_emergencia">Nome do Contato de Emergência</label>
                <input type="text" id="nome_contato_emergencia" name="nome_contato_emergencia" value="{{ profissional.nome_contato_emergencia or '' }}" placeholder="Nome completo do contato">
            </div>

            <div class="form-group">
                <label for="telefone_contato_emergencia">Telefone do Contato de Emergência</label>
                <input type="tel" id="telefone_contato_emergencia" name="telefone_contato_emergencia" value="{{ profissional.telefone_contato_emergencia or '' }}" placeholder="(00) 00000-0000">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="especialidade">Especialidade *</label>
                <select id="especialidade" name="especialidade" required onchange="toggleCustomSpecialty()">
                    <option value="">Selecione uma especialidade</option>
                    <option value="Psicólogo" {% if profissional.especialidade == 'Psicólogo' %}selected{% endif %}>Psicólogo</option>
                    <option value="Psiquiatra" {% if profissional.especialidade == 'Psiquiatra' %}selected{% endif %}>Psiquiatra</option>
                    <option value="Terapeuta" {% if profissional.especialidade == 'Terapeuta' %}selected{% endif %}>Terapeuta</option>
                    <option value="Assistente Social" {% if profissional.especialidade == 'Assistente Social' %}selected{% endif %}>Assistente Social</option>
                    <option value="TI" {% if profissional.especialidade == 'TI' %}selected{% endif %}>TI (Tecnologia da Informação)</option>
                    <option value="Suporte" {% if profissional.especialidade == 'Suporte' %}selected{% endif %}>Suporte</option>
                    <option value="Outro" {% if profissional.especialidade == 'Outro' %}selected{% endif %}>Outro</option>
                </select>

            </div>
        </div>

        <div class="form-row {% if profissional.especialidade != 'Outro' %}hidden-field{% else %}hidden-field show{% endif %}" id="customSpecialtyField">
            <div class="form-group full">
                <label for="especialidade_customizada">Especifique a Especialidade</label>
                <input type="text" id="especialidade_customizada" name="especialidade_customizada" 
                       value="{{ profissional.especialidade_customizada or '' }}"
                       placeholder="Ex: Desenvolvedor Backend, Técnico de Rede, etc.">
                <div class="specialty-note">
                    ℹ️ Digite a especialidade customizada quando a especialidade for "Outro"
                </div>
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('profissionais.ver_profissional', id=profissional.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Salvar Alterações</button>
        </div>
</div>
</form>

<script>
    function toggleCustomSpecialty() {
        const specialty = document.getElementById('especialidade').value;
        const customField = document.getElementById('customSpecialtyField');
        const customInput = document.getElementById('especialidade_customizada');
        
        if (specialty === 'Outro') {
            customField.classList.add('show');
            customInput.required = true;
        } else {
            customField.classList.remove('show');
            customInput.required = false;
        }
    }

    // Verificar ao carregar a página
    document.addEventListener('DOMContentLoaded', function() {
        toggleCustomSpecialty();
    });
</script>
{% endblock %}
